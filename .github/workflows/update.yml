name: Update dashboard data

on:
  schedule:
    - cron: '7,37 * * * *'      # ~ mỗi 30 phút (phút 7 & 37 để né kẹt giờ tròn)
  workflow_dispatch:            # cho phép bấm chạy tay ở tab Actions

permissions:
  contents: write               # để commit data.json trở lại repo

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Build data.json from Google Sheet
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python build_data.py
      - name: Commit if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Cập nhật số $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
